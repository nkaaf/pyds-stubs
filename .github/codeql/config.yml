name: "High Security CodeQL Config"

# Most secure settings: extended, all relevant queries, fail on errors, enable experimental
queries:
  - uses: security-extended
  - uses: security-and-quality
  - uses: github/codeql-python-queries
  - uses: github/codeql-actions-queries

options:
  allow-experimental-queries: true
  failOn: error
  max-paths: 10
  threads: 4
