name: "Auditing"
permissions:
  contents: read

on:
  pull_request:

jobs:
  linting:
    # No linting on '1.0.2-stubs', because ruff does not support Python < 3.7
    if: |
      (github.event.pull_request.base.ref != 'production') &&
      (github.event.pull_request.base.ref != "1.0.2-stubs")
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          ref: ${{ github.head_ref }}

      - uses: astral-sh/ruff-action@57714a7c8a2e59f32539362ba31877a1957dded1 # v3.5.1
        with:
          src: "./src"

  audit:
    if: github.event.pull_request.base.ref != 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          ref: ${{ github.head_ref }}

      - uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: "."

  audit-dev:
    if: github.event.pull_request.base.ref != 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          ref: ${{ github.head_ref }}

      - uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: "."