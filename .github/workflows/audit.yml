name: audit.yml

on:
  pull_request:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to audit'
        required: true
        type: string

jobs:
  linting:
    if: >
      ${{
        (github.event_name == 'pull_request' &&
          github.head_ref != 'production' &&
          github.event.pull_request.base.ref != 'production')
        ||
        (github.event_name == 'workflow_dispatch' &&
          github.ref_name != 'production')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.inputs.branch || github.head_ref }}

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.8"
          check-latest: "true"
          cache: "pip"

      - name: Dependency Installation
        run: python3 -m pip install .

      - uses: astral-sh/ruff-action@v3.5.0
        with:
          version-file: "requirements/dev/requirements.txt"
          src: "./src"

  audit:
    if: >
      ${{
        (github.event_name == 'pull_request' &&
          github.head_ref != 'production' &&
          github.event.pull_request.base.ref != 'production')
        ||
        (github.event_name == 'workflow_dispatch' &&
          github.ref_name != 'production')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.inputs.branch || github.head_ref }}

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.8"
          check-latest: "true"
          cache: "pip"

      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: "requirements/library/requirements.txt"

  audit-dev:
    if: >
      ${{
        (github.event_name == 'pull_request' &&
          (github.head_ref == 'production' || github.event.pull_request.base.ref == 'production'))
        ||
        (github.event_name == 'workflow_dispatch' &&
          github.ref_name == 'production')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.inputs.branch || github.head_ref }}

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.13"
          check-latest: "true"
          cache: "pip"

      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: "requirements/dev/requirements.txt"
